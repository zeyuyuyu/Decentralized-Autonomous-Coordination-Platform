<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModelScope - AI Models Made Fun!</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body class="bg-gray-100">
    <nav class="bg-gradient-to-r from-purple-600 to-indigo-600 p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-bold text-white animate__animated animate__pulse animate__infinite">✨ ModelScope</h1>
            <div class="flex items-center space-x-4">
                <span class="text-white">🏆 Your Points: <span id="userPoints" class="font-bold">0</span></span>
                <button id="shareBtn" class="bg-white text-purple-600 px-4 py-2 rounded-full hover:bg-purple-100 transition">🚀 Share Creation</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4">
        <div class="grid md:grid-cols-2 gap-8">
            <!-- Model Interface -->
            <div class="bg-white rounded-xl shadow-xl p-6">
                <h2 class="text-2xl font-bold mb-4">Create Something Amazing! 🎨</h2>
                <div class="space-y-4">
                    <textarea id="modelInput" class="w-full p-4 border rounded-lg focus:ring-2 focus:ring-purple-500" placeholder="Describe what you want to create..."></textarea>
                    <button id="generateBtn" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-3 rounded-lg hover:opacity-90 transition transform hover:scale-105">
                        ✨ Generate Magic!
                    </button>
                </div>
                <div id="result" class="mt-4"></div>
            </div>

            <!-- Social Feed -->
            <div class="bg-white rounded-xl shadow-xl p-6">
                <h2 class="text-2xl font-bold mb-4">🔥 Trending Creations</h2>
                <div id="socialFeed" class="space-y-4 max-h-[600px] overflow-y-auto">
                    <!-- Dynamic Feed Items -->
                </div>
            </div>
        </div>

        <!-- Achievements Panel -->
        <div class="mt-8 bg-white rounded-xl shadow-xl p-6">
            <h2 class="text-2xl font-bold mb-4">🏆 Your Achievements</h2>
            <div id="achievements" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <!-- Achievement Cards -->
            </div>
        </div>
    </main>

    <!-- Social Share Modal -->
    <div id="shareModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
        <div class="bg-white rounded-xl p-6 max-w-md w-full">
            <h3 class="text-xl font-bold mb-4">Share Your Creation! 🚀</h3>
            <div class="space-y-4">
                <button class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600">Share to Twitter</button>
                <button class="w-full bg-indigo-500 text-white py-2 rounded-lg hover:bg-indigo-600">Share to Discord</button>
                <button class="w-full bg-green-500 text-white py-2 rounded-lg hover:bg-green-600">Copy Link</button>
            </div>
        </div>
    </div>

    <script>
        // Gamification System
        let points = 0;
        const achievements = [
            { name: 'First Creation', points: 100, icon: '🎨' },
            { name: 'Going Viral', points: 500, icon: '🚀' },
            { name: 'Creative Master', points: 1000, icon: '👑' },
            { name: 'Trendsetter', points: 2000, icon: '💫' }
        ];

        // Simulate Real-time Feed
        function addFeedItem(content) {
            const feedHtml = `
                <div class="border rounded-lg p-4 hover:shadow-lg transition animate__animated animate__fadeIn">
                    <div class="flex items-center space-x-2 mb-2">
                        <img src="https://api.dicebear.com/6.x/avataaars/svg?seed=${Math.random()}" class="w-8 h-8 rounded-full">
                        <span class="font-bold">User${Math.floor(Math.random() * 1000)}</span>
                    </div>
                    <p>${content}</p>
                    <div class="mt-2 flex items-center space-x-4 text-gray-600">
                        <button onclick="like(this)" class="hover:text-purple-600">❤️ 0</button>
                        <button class="hover:text-purple-600">💬 Comment</button>
                        <button class="hover:text-purple-600">🔁 Remix</button>
                    </div>
                </div>
            `;
            document.getElementById('socialFeed').insertAdjacentHTML('afterbegin', feedHtml);
        }

        // Like Function
        function like(btn) {
            const currentLikes = parseInt(btn.textContent.split(' ')[1]);
            btn.textContent = `❤️ ${currentLikes + 1}`;
            addPoints(5);
        }

        // Add Points
        function addPoints(amount) {
            points += amount;
            document.getElementById('userPoints').textContent = points;
            checkAchievements();
        }

        // Initialize
        document.getElementById('generateBtn').addEventListener('click', () => {
            const input = document.getElementById('modelInput').value;
            if(input) {
                addFeedItem(input);
                addPoints(50);
            }
        });

        document.getElementById('shareBtn').addEventListener('click', () => {
            document.getElementById('shareModal').classList.remove('hidden');
        });

        // Simulate initial feed
        const sampleContent = [
            'Just created an amazing AI artwork! 🎨',
            'Check out this cool model generation 🚀',
            'My first AI creation, what do you think? ✨',
            'This tool is addictive! 🔥'
        ];

        sampleContent.forEach(content => addFeedItem(content));

        // Close modal when clicking outside
        document.getElementById('shareModal').addEventListener('click', (e) => {
            if(e.target.id === 'shareModal') {
                e.target.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
